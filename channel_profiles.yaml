# ─────────────────────────────────────────────────────────────────────────────
# T E L E G R A M   P R O F I L E S
# ─────────────────────────────────────────────────────────────────────────────

- channel_id: tg_personal_leader
  name: "Telegram-истории — mAIn WAY"
  platform: telegram
  enabled: true

  kb_query:
    # Темы — описание аудитории и её интересов (для агента, не для поиска)
    audience_description: |
      Малый и средний бизнес, предприниматели, фрилансеры.
      Хотят конкретную пользу: какой инструмент сэкономил время,
      какой ИИ решил их проблему, как внедрить без инженера.
      Интересует практика, а не теория.

    topics:
      - "Инструменты ИИ для решения реальных бизнес-задач: автоматизация, аналитика, чат-боты"
      - "ИИ для маркетинга, продаж, клиентского сервиса"
      - "ИИ для операционной работы: документы, процессы, планирование"
      - "Обзоры и сравнения ИИ-инструментов для не-технарей"
      - "Готовые решения для SMB: подписки, интеграции, pricing"

    # Антитемы — темы, которые НЕ интересны этой аудитории
    anti_topics:
      - Политические и геополитические ИИ-новости (санкции, регулирование, войны)
      - Академическая теория и исследования без практического применения
      - Узкоспециализированные темы (медицинские ИИ-исследования, научные бенчмарки)
      - Сделки и финансовые новости ИИ-компаний на бирже (IPO, фандрейзинг, оценки)
      - Аэрокосмические и оборонные ИИ-проекты
      - Hardware и GPU-бенчмарки без привязки к бизнесу

    languages: [en, ru]
    priorities: [high, medium]
    sources: []
    days_back: 30
    fts_query: ""
    limit: 2000

  schedule:
    posts_per_day: 3
    times: ["09:00", "13:00", "18:00"]

  moderation:
    approval_required: true
    draft_dir: tg_personal_leader/

  compose:
    temperature: 0.75
    max_tokens: 0
    style: story
    system_prompt_addon: |
      Контент для историй — ТОЛЬКО реальные картинки из статей (og:image → Vision AI → crop 9:16).
      Генерация картинки по тексту НЕ используется.

      ИНТЕРЕСНО этой аудитории:
      - Инструменты ИИ для решения реальных бизнес-задач
      - Практические кейсы внедрения с измеримым результатом
      - ИИ для маркетинга, продаж, клиентского сервиса
      - Готовые решения для SMB с понятным pricing
      - Обзоры и сравнения ИИ-инструментов для не-технарей

      НЕИНТЕРЕСНО (пропускай такие посты):
      - Политические/геополитические ИИ-новости
      - Академическая теория без практического применения
      - Сделки ИИ-компаний на бирже (IPO, фандрейзинг)
      - Аэрокосмос и оборона
      - Узкоспециализированные медицинские/научные темы

      Для каждой истории:
      1) 📷 описание — что видно на фото из статьи
      2) caption — короткая подпись (до 200 символов)
      3) Источник и ссылка

  post:
    skill: telegram-messaging
    use_draft: true
    approval_required: true
    params:
      parse_mode: HTML
      disable_web_preview: true
      disable_notification: false
      chat_id: "4267da2b4c67"

