# ═══════════════════════════════════════════════════════════════════════════════
# Content Bank — Channel & Publication Profiles
# ═══════════════════════════════════════════════════════════════════════════════
# Формат: YAML
# Каждый профиль = один канал / рассылка / аккаунт.
#
# platforms: telegram | listmonk | instagram | linkedin | facebook | twitter | web
#
# Структура профиля:
#   channel_id    — уникальный ID (латиница, _ допустим)
#   name          — человеческое название
#   platform      — платформа
#   enabled       — включён / выключен
#
#   kb_query      — запрос к Knowledge Base (какие посты брать)
#   schedule      — расписание и периодичность
#   moderation    — модерация / утверждение
#
#   compose       — КАК генерировать контент (СКИЛЫ + ПРОМПТ)
#   post          — КАК публиковать (СКИЛЫ + ПАРАМЕТРЫ)
#
# ═══════════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
# БЛОК compose
# ─────────────────────────────────────────────────────────────────────────────
#
# compose:
#   skill: str                  — Hermes skill для генерации
#                                telegram-messaging | llm-scraper | generic-compose
#                                Пусто = встроенный composer (format_* функции)
#   model: str                  — модель (по умолчанию: текущая)
#   temperature: 0.7           — креативность 0.0–1.0
#   max_tokens: 2000           — макс. длина на выходе (0 = без лимита)
#   system_prompt: ""           — доп. инструкции для-compose агента
#   style: news|brief|thread|single — стиль (если skill=встроенный)
#
# ─────────────────────────────────────────────────────────────────────────────
# БЛОК post
# ─────────────────────────────────────────────────────────────────────────────
#
# post:
#   skill: str                  — Hermes skill для постинга
#                                telegram-messaging | listmonk-campaign-api |
#                                xurl (Twitter) | native
#                                Пусто = native (встроенная функция)
#   params: {}                   — платформо-специфичные параметры
#   use_draft: true             — брать контент из drafts/ (True)
#                                или генерировать на лету (False)
#   approval_required: true     — требовать ручного утверждения перед post
#
# ─────────────────────────────────────────────────────────────────────────────
# ПРИМЕРЫ post.params ПО ПЛАТФОРМАМ
# ─────────────────────────────────────────────────────────────────────────────
#
# telegram:
#   parse_mode: HTML            — HTML | MarkdownV2 | null
#   disable_web_preview: true
#   disable_notification: false
#
# listmonk:
#   content_type: markdown      — markdown | html | plain
#   campaign_name: "{date}"     — шаблон с датой
#   subject: "Тема за {date}"
#   from_name: "AI Digest"
#   reply_to: "info@example.com"
#   template_id: 0
#
# instagram:
#   image_required: true
#   image_aspect: 1.0           — 1.0=квадрат, 0.56=портрет 9:16
#   caption_max_length: 2200
#   hashtags_auto: true
#   hashtags: [AI, Tech, News]
#
# linkedin:
#   content_type: article       — text | article | image
#   visibility: PUBLIC          — PUBLIC | CONNECTIONS_ONLY
#   image_required: false
#
# twitter:
#   thread_mode: false
#   image_required: false
#
# facebook:
#   content_type: post          — post | link | article
#   image_required: false
#
# ═══════════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
# L I S T M O N K   P R O F I L E S
# ─────────────────────────────────────────────────────────────────────────────

- channel_id: listmonk_production
  name: "ИИ для производственных компаний"
  platform: listmonk
  enabled: true

  kb_query:
    categories: [ai_research, startups_vc, ru_corp_it]
    languages: [ru, en]
    priorities: [high, medium]
    sources: []
    days_back: 7
    fts_query: "manufacturing OR industrial OR plant OR factory OR production AI implementation"
    limit: 30

  schedule:
    posts_per_day: 1
    times: ["10:00"]

  moderation:
    approval_required: true
    draft_dir: listmonk_production/

  # ── COMPOSE ────────────────────────────────────────────────────────────────
  compose:
    # skill: пусто = встроенный composer (format_brief)
    # Для кастомного LLM-композита раскомментируй и настрой:
    # skill: generic-compose
    # model: ""
    temperature: 0.7
    max_tokens: 0
    style: brief
    # system_prompt_addon: |
    #   Пиши как эксперт по промышленной автоматизации.
    #   Фокус на практические кейсы внедрения.

  # ── POST ──────────────────────────────────────────────────────────────────
  post:
    skill: listmonk-campaign-api
    use_draft: true
    approval_required: true
    params:
      list_id: 5
      content_type: markdown
      campaign_name: "ИИ для производства — {date}"
      subject: "ИИ в производстве: дайджест за {date}"
      from_name: "AI Digest"
      reply_to: "info@main-way.com"


